[pre-commit]
parallel = true

[pre-commit.commands.format-just]
run = """
for file in {staged_files}; do
    just --justfile "$file" --fmt --unstable
done
"""
glob = ["*.just", ".justfile"]
stage_fixed = true

[pre-commit.commands.format-yaml]
run = "yamlfmt {staged_files}"
glob = ["*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-yaml]
run = "yamllint {staged_files}"
glob = ["*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-action]
run = "actionlint {staged_files}"
glob = ["*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-markdown]
run = "markdownlint-cli2 {staged_files}"
glob = ["*.yaml"]
stage_fixed = true
