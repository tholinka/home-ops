[pre-commit]
parallel = true

[pre-commit.commands.format-just]
run = """
for file in {staged_files}; do
    just --justfile "$file" --fmt
done
"""
glob = ["*.just", ".justfile"]
stage_fixed = true

[pre-commit.commands.lint-yaml]
run = "yamllint {staged_files}"
glob = ["*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-action]
run = "actionlint {staged_files}"
glob = [".github/workflows/*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-markdown]
run = "markdownlint-cli2 {staged_files}"
glob = ["*.md"]
stage_fixed = true

[pre-commit.commands.ggshield]
run = "ggshield secret scan pre-commit"
