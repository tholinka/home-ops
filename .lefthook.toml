[pre-commit]
parallel = true

[pre-commit.commands.format-just]
run = "for f in {staged_files}; do just --justfile $f --fmt; done"
glob = ["*.just", ".justfile"]
stage_fixed = true

[pre-commit.commands.lint-yaml]
run = "yamllint {staged_files}"
glob = ["*.yml", "*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-action]
run = "actionlint {staged_files}"
glob = [".github/workflows/*.yaml"]
stage_fixed = true

[pre-commit.commands.lint-markdown]
run = "markdownlint-cli2 {staged_files}"
glob = ["*.md"]
stage_fixed = true

[pre-commit.commands.format-mise]
glob = [".mise.toml"]
run = "mise fmt"
stage_fixed = true

[pre-commit.commands.shellcheck]
run = "shellcheck {staged_files}"
glob = ["*.sh"]

[pre-commit.commands.ggshield]
run = "ggshield secret scan pre-commit"

[pre-commit.commands.zizmor]
run = "zizmor --offline {staged_files}"
glob = [".github/workflows/*.yaml"]
