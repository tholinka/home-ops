---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.5@sha256:557ea3b67b2380bdf91f3006ecea924e10e2963dbaf6085887652311e581460b
    values: &template [./templates/values.yaml.gotmpl]
    hooks:
      - # Wait for Cilium CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/ciliumbgpadvertisements.cilium.io
          - crd/ciliumbgpclusterconfigs.cilium.io
          - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
        events:
          - postsync
        showlogs: true
      - # Apply Cilium Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/networks.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.46.0@sha256:f272aeaed0ffa521e198f5cb827bc589cbdab9e60338b9f905d9376044068f39
    values: *template
    needs: [kube-system/cilium]

  - name: spegel
    namespace: system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.1@sha256:9efb90dbec90f3ffda195196eaa151cd1a6c2c30d44d59bb2c0853edf08d4430
    values: *template
    needs: [kube-system/coredns]

  - name: cert-manager
    namespace: security
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2@sha256:294a761ca972ea11ae79b9219960ca13a5337a1cbb550604c151586d266159eb
    values: *template
    needs: [system/spegel]

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.52.0@sha256:e25cf78b888fb82afadcb0c06bbb3dce8c5c5d0313e304ce67b6a7744977e458
    values: *template
    needs: [security/cert-manager]

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.52.0@sha256:abad7f3640346f2d44493005801b5da4dc1266ee1e540baee8faf48762b5ba8b
    values: *template
    needs: [flux-system/flux-operator]
    wait: false
