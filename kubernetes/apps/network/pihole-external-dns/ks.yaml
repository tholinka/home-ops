---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pihole-external-dns
  namespace: &namespace network
spec:
  interval: 1h
  targetNamespace: *namespace
  components:
    - ../../../../components/scaler/metrics
  dependsOn:
    - name: pihole
  path: ./kubernetes/apps/network/pihole-external-dns/app
  prune: true
  postBuild:
    substitute:
      APP: *app
      SCALER_METRIC_NAME: kube_statefulset_status_replicas_ready
      SCALER_VALUE: '3'
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  patches:
    - patch: |-
        - op: add
          path: /spec/metrics/0/external/metric/selector
          value:
            matchLabels:
              statefulset: pihole
      target:
        group: autoscaling
        kind: HorizontalPodAutoscaler
