---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pihole-nebula-sync
  namespace: network
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          *app :
            image:
              repository: ghcr.io/lovelaze/nebula-sync
              tag: v0.11.2@sha256:951576b448c08df16cc6b46f90cc3b40c44e10dfb56e431dfd0f1ead7d435724
            env:
              FULL_SYNC: false
              CRON: '0/10 * * * *' # sync should be fast, since we're only syncing dns entries, but there seems to be a memory leak that eventually kills the primary pihole... also it randomly breaks the exporter sometimes
              RUN_GRAVITY: false

              SYNC_CONFIG_DNS: true # sync external dns
              SYNC_GRAVITY_DOMAIN_LIST: true # sync manual allow/deny list (lost on restart because of emptyDir)

              SYNC_CONFIG_DNS_EXCLUDE: upstreams # nas has a different set of upstreams
            envFrom:
              - secretRef:
                  name: *app
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFileSystem: true
              capabilities: { drop: ['ALL'] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
    defaultPodOptions:
      priorityClassName: system-cluster-critical
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
