---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret renovate-operator
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: *secret
    template:
      data:
        RENOVATE_OPERATOR_CLIENT_ID: '{{ .RENOVATE_OPERATOR_CLIENT_ID }}'
        RENOVATE_OPERATOR_CLIENT_SECRET: '{{ .RENOVATE_OPERATOR_CLIENT_SECRET }}'
        RENOVATE_OPERATOR_SESSION_SECRET: '{{ .RENOVATE_OPERATOR_SESSION_SECRET }}'
  dataFrom:
    - extract:
        key: renovate
