---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.36.0/mutatingadmissionpolicybinding-admissionregistration-v1.json
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: &name kopiur-source-pvc-writable
spec:
  policyName: *name
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.36.0/mutatingadmissionpolicy-admissionregistration-v1.json
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicy
metadata:
  name: kopiur-source-pvc-writable
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ['']
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  matchConditions:
    - name: is-kopiur-managed
      expression: >-
        has(object.metadata.labels) &&
        "app.kubernetes.io/managed-by" in object.metadata.labels &&
        object.metadata.labels["app.kubernetes.io/managed-by"] == "kopiur"
    - name: has-source-volume-with-readonly-pvc
      expression: >-
        has(object.spec.volumes) &&
        object.spec.volumes.exists(v,
          v.name == "source" &&
          has(v.persistentVolumeClaim) &&
          has(v.persistentVolumeClaim.readOnly) &&
          v.persistentVolumeClaim.readOnly == true
        )
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          [
            JSONPatch{
              op: "remove",
              path: "/spec/volumes/" + string(object.spec.volumes.indexOf(
                object.spec.volumes.filter(v, v.name == "source")[0]
              )) + "/persistentVolumeClaim/readOnly"
            }
          ]
