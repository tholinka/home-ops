---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur
  namespace: &namespace kopiur-system
spec:
  interval: 1h
  path: ./kubernetes/apps/kopiur-system/kopiur/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
  namespace: &namespace kopiur-system
spec:
  interval: 1h
  components:
    - ../../../../components/ext-auth
    - ../../../../components/ext-auth/two
  dependsOn:
    - name: &app kopiur
      namespace: *namespace
  path: ./kubernetes/apps/kopiur-system/kopiur/repository
  postBuild:
    substitute:
      APP: *app
      EXT_AUTH_TARGET: kopia-nas
      EXT_AUTH_TARGET_2: kopia-s3
    substituteFrom:
      - kind: Secret
        name: kopiur-s3-substitute
        optional: false

  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
