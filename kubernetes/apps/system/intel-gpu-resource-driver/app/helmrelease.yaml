---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app intel-gpu-resource-driver
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    cdi:
      staticPath: /run/cdi
      dynamicPath: /run/cdi
    kubeletPlugin:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: 'true'
      # xpumd is not deployed, so disable health monitoring to avoid
      # trying to connect to /run/xpumd/intelxpuinfo.sock.
      # With health monitoring off, privileged mode is required for the driver
      # to query hardware details directly from devices.
      privileged: true
      healthMonitoring:
        enabled: false
