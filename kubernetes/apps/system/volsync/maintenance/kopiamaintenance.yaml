---
# yaml-language-server: $schema=https://schemas.tholinka.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: nfs
  namespace: system
spec:
  enabled: true
  trigger:
    schedule: 30 3,15 * * *
  repository:
    repository: volsync-nfs-maintenance-secret
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          server: nas.servers.internal
          path: /backups/VolsyncKopia
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: s3
  namespace: system
spec:
  enabled: true
  trigger:
    schedule: 30 3 * * */2
  repository:
    repository: volsync-s3-maintenance-secret
