---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds-ready
  namespace: &namespace flux-system
spec:
  interval: 1h
  targetNamespace: *namespace
  path: ./kubernetes/apps/flux-system/healthcheck/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - &crds
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: snapshotpolicies.kopiur.home-operations.com
    - <<: *crds
      name: snapshotschedules.kopiur.home-operations.com
    - <<: *crds
      name: restores.kopiur.home-operations.com
    - <<: *crds
      name: externalsecrets.external-secrets.io
    - <<: *crds
      name: servicemonitors.monitoring.coreos.com
    - <<: *crds
      name: podmonitors.monitoring.coreos.com
    - <<: *crds
      name: ciliumnetworkpolicies.cilium.io
    - <<: *crds
      name: ciliumclusterwidenetworkpolicies.cilium.io
    - <<: *crds
      name: certificates.cert-manager.io
    - <<: *crds
      name: httproutes.gateway.networking.k8s.io
    - <<: *crds
      name: securitypolicies.gateway.envoyproxy.io
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-ready
  namespace: &namespace flux-system
spec:
  interval: 1h
  targetNamespace: *namespace
  path: ./kubernetes/apps/flux-system/healthcheck/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: &cephApiVersion ceph.rook.io/v1
      kind: &cephKind CephCluster
      name: rook-ceph
      namespace: rook-ceph
    - apiVersion: apps/v1
      kind: Deployment
      name: kopiur-controller
      namespace: kopiur-system
    - &crd
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: snapshotpolicies.kopiur.home-operations.com
    - <<: *crd
      name: snapshotschedules.kopiur.home-operations.com
    - <<: *crd
      name: restores.kopiur.home-operations.com
    - <<: *crd
      name: externalsecrets.external-secrets.io
  healthCheckExprs:
    - apiVersion: *cephApiVersion
      kind: *cephKind
      failed: status.ceph.health == 'HEALTH_ERR'
      current: status.ceph.health in ['HEALTH_OK', 'HEALTH_WARN']
    - apiVersion: kopiur.home-operations.com/v1alpha1
      kind: ClusterRepository
      current: status.phase in ['Ready']
      failed: status.phase in ['Degraded', 'Failed']
