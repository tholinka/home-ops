---
# yaml-language-server: $schema=https://flux.tholinka.dev/helmrelease/v2/github/controlplaneio-fluxcd/charts/main/charts/flux-operator
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: flux-operator
  values:
    serviceMonitor:
      create: true
    web:
      configSecretName: flux-operator-web-config-secret
      httpRoute:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Infrastructure
          gethomepage.dev/name: Flux Operator
          gethomepage.dev/icon: flux-cd.svg
        hostnames:
          - flux-operator.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
      networkPolicy:
        create: false
