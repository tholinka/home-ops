---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dfguard
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'

        containers:
          app:
            image:
              repository: ghcr.io/m00nwtchr/dfguard
              tag: 0.2.8@sha256:4f4d55c7f91783856347898708617db818ebc4810846f79cf4a589f7b02045e5
            env:
              DFGUARD_UPSTREAM: dragonfly-cluster.database.svc.cluster.local:6379
              DFGUARD_SERVER_CERT: /tls/server/tls.crt
              DFGUARD_SERVER_KEY: /tls/server/tls.key
              DFGUARD_SERVER_CA: /tls/server/ca.crt
              DFGUARD_UPSTREAM_CERT: /tls/dragonfly/tls.crt
              DFGUARD_UPSTREAM_KEY: /tls/dragonfly/tls.key
              DFGUARD_UPSTREAM_CA: /tls/dragonfly/ca.crt
              DFGUARD_METRICS_LISTEN: '[::]:9464'
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /livez
                port: &metricsPort 9464
              readiness:
                enabled: true
                type: HTTP
                path: /readyz
                port: *metricsPort
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

    defaultPodOptions:
      hostUsers: false
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532

    service:
      app:
        controller: *app
        ports:
          redis:
            port: 6379
          metrics:
            port: *metricsPort

    persistence:
      acl:
        type: secret
        name: dragonfly-acls
        globalMounts:
          - path: /config
            readOnly: true

      tls:
        type: custom
        globalMounts:
          - path: /tls/server
            readOnly: true
        volumeSpec:
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: dfguard-client-ca
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/key-algorithm: Ed25519
              csi.cert-manager.io/key-usages: server auth
              csi.cert-manager.io/dns-names: dfguard.${POD_NAMESPACE}.svc.cluster.local,${POD_NAME}.${POD_NAMESPACE}.svc.cluster.local

      dragonfly-cert:
        type: custom
        globalMounts:
          - path: /tls/dragonfly
            readOnly: true
        volumeSpec:
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: dragonfly-client-ca
              csi.cert-manager.io/issuer-kind: Issuer
              csi.cert-manager.io/key-algorithm: Ed25519
              csi.cert-manager.io/key-usages: client auth
              csi.cert-manager.io/dns-names: ${POD_NAME}.${POD_NAMESPACE}.svc.cluster.local

    rawResources:
      netpol:
        manifest:
          apiVersion: cilium.io/v2
          kind: CiliumNetworkPolicy
          spec:
            endpointSelector:
              matchLabels:
                app.kubernetes.io/name: *app
                app.kubernetes.io/instance: *app
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: database
                      app: dragonfly-cluster
                      app.kubernetes.io/name: dragonfly
                      app.kubernetes.io/part-of: dragonfly
                toPorts:
                  - ports:
                      - port: '6379'
                        protocol: TCP
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: kube-system
                      k8s-app: kube-dns
                toPorts:
                  - ports:
                      - port: '53'
                        protocol: ANY
                    rules:
                      dns:
                        - matchPattern: '*'
