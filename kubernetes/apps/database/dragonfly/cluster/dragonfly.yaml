---
# yaml-language-server: $schema=https://schemas.tholinka.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly-cluster
spec:
  annotations:
    reloader.stakater.com/auto: 'true'

  image: ghcr.io/dragonflydb/dragonfly:v1.38.1@sha256:baf70ba7ad182a992b988497cfa31a488978c8fab7712079784c2401f447e402

  replicas: 2

  snapshot:
    cron: '*/5 * * * *'
    persistentVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi

  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi

  args:
    - '--bind=::'
    - '--admin_bind=::'
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --dbfilename=persistentState
    # immich needs this for bullmq, this has some pretty big performance implications though
    - --default_lua_flags=allow-undeclared-keys
    # this gets some performance back, however
    - --lock_on_hashtags

  resources:
    requests:
      cpu: 100m
    limits:
      memory: 512Mi

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly

  aclFromSecret:
    key: acl.conf
    name: dragonfly-acls

  authentication:
    clientCaCertSecret:
      name: dragonfly-client-ca
      key: ca.crt

  tlsSecretRef:
    name: dragonfly-server-cert
