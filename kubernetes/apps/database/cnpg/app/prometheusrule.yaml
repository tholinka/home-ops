---
# yaml-language-server: $schema=https://schemas.tholinka.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnative-pg-rules
  namespace: database
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: cloudnative-pg.rules
      rules:
        - alert: LongRunningTransaction
          annotations:
            description: Pod {{ $labels.pod }} is taking more than 5 minutes (300 seconds) for a query.
            summary: A query is taking longer than 5 minutes.
          expr: |-
            cnpg_backends_max_tx_duration_seconds > 300
          for: 1m
          labels:
            severity: warning
        - alert: BackendsWaiting
          annotations:
            description: Pod {{ $labels.pod  }} has been waiting for longer than 5 minutes
            summary: If a backend is waiting for longer than 5 minutes
          expr: |-
            cnpg_backends_waiting_total > 300
          for: 1m
          labels:
            severity: warning
        - alert: PGDatabase
          annotations:
            description: Over 150,000,000 transactions from frozen xid on pod {{ $labels.pod  }}
            summary: Number of transactions from the frozen XID to the current one
          expr: |-
            cnpg_pg_database_xid_age > 150000000
          for: 1m
          labels:
            severity: warning
        - alert: PGReplication
          annotations:
            description: Standby is lagging behind by over 500s (8.3mins)
            summary: The standby is lagging behind the primary
          expr: |-
            cnpg_pg_replication_lag > 500
          for: 5m
          labels:
            severity: warning
        - alert: LastFailedArchiveTime
          annotations:
            description: Archiving failed for {{ $labels.pod }}
            summary: Checks the last time archiving failed. Will be -1 when it has not failed.
          expr: |-
            delta(cnpg_pg_stat_archiver_last_failed_time[5m]) > 0
          for: 1m
          labels:
            severity: warning
        - alert: DatabaseDeadlockConflicts
          annotations:
            description: There are over 10 deadlock conflicts in {{ $labels.pod }}
            summary: Checks the number of database conflicts
          expr: |-
            cnpg_pg_stat_database_deadlocks > 10
          for: 1m
          labels:
            severity: warning
        - alert: FailedObjectStoreBackup # from https://github.com/cloudnative-pg/cloudnative-pg/discussions/9161#discussioncomment-15001487
          annotations:
            description: |-
              Last object store backup failed. Use kubectl -n database get backups.postgresql.cnpg.io -o json | jq '.items[] | select(.status.phase == "failed" and .spec.method == "plugin") | { name: .metadata.name, error: .status.error, startedAt: .status.startedAt }' to list failed object store backups.
            summary: Checks if the last object store backup has failed.
          expr: |-
            (barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp - barman_cloud_cloudnative_pg_io_last_available_backup_timestamp) > 1
          for: 1m
          labels:
            severity: warning
        - alert: FailedVolumeSnapshotBackup
          annotations:
            description: |-
              Last volume snapshot backup failed. Use kubectl -n database get backups.postgresql.cnpg.io -o json | jq '.items[] | select(.status.phase == "failed" and .spec.method == "volumeSnapshot") | { name: .metadata.name, error: .status.error, startedAt: .status.startedAt }' to list failed volume snapshot backups.
            summary: Checks if the last volume snapshot backup has failed.
          expr: |-
            (max(kube_customresource_cnpg_last_backup_started_at{method = "volumeSnapshot", phase = "failed"}) - max(kube_customresource_cnpg_last_backup_started_at{method = "volumeSnapshot", phase = "completed"})) > 1
          for: 1m
          labels:
            severity: warning
        - alert: NoObjectStoreBackup
          annotations:
            description: No object store backup within the last 48 hours
            summary: Checks for recent object store backups
          expr: |-
            (barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp != 0) and (time() - barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp > 172800)
