---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app palworld
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: ghcr.io/jammsen/docker-palworld-dedicated-server
              tag: master@sha256:ee924ca970450f59c89656953367c42c07327a7cdffc66f156be285dccae93c8
            env:
              # https://github.com/jammsen/docker-palworld-dedicated-server/blob/develop/docs/ENV_VARS.md
              ## Container Settings
              BACKUP_ENABLED: false #kopiur is backing up the PVC
              RESTART_ENABLED: false #no one is playing right now.
              RESTART_CRON_EXPRESSION: 0 5 * * * #5am daily
              COMMUNITY_SERVER: false
              SERVER_SETTINGS_MODE: auto
              ## Server Gameplay Settings
              DEATH_PENALTY: None
              EXP_RATE: '0.500000'
              BASE_CAMP_WORKER_MAXNUM: 20
              PAL_EGG_DEFAULT_HATCHING_TIME: '0.500000'
              ENABLE_NON_LOGIN_PENALTY: false
              ## Server Settings
              SERVER_NAME: Cabbages
              SERVER_DESCRIPTION: Palworld Server
              PUBLIC_PORT: &port 8211
              ## Webhook Settings
              WEBHOOK_ENABLED: true
            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}'
            resources:
              requests:
                cpu: 1
                memory: 8Gi
              limits:
                memory: 24Gi

    persistence:
      config:
        existingClaim: '{{ .Release.Name }}'
        globalMounts:
          - path: /palworld/Pal/Saved
            subPath: saved
      cache:
        existingClaim: '{{ .Release.Name }}-cache'
        globalMounts:
          - path: /palworld
            subPath: palworld
      tmpfs:
        type: emptyDir
        advancedMounts:
          palworld:
            app:
              - path: /tmp
                subPath: tmp

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.21.20, fd83:43a4:6dab:21::20
        ports:
          game:
            protocol: UDP
            port: *port
