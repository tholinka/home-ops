---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: flux-git-repository-operation-failed
spec:
  matchers:
    - name: alertname
      value: FluxGitRepositoryGitoperationfailed
    - name: reason
      value: GitOperationFailed
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-nfsmount-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: fstype
      value: (btrfs|xfs)
      matchType: '=~'
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  # there are separate btrfs warnings setup, since the defaults aren't accurate for btrfs
  name: no-regular-filesystem-out-of-space-warning-on-btrfs
spec:
  matchers:
    - name: alertname
      value: (NodeFilesystemAlmostOutOfSpace|NodeFilesystemSpaceFillingUp)
      matchType: '=~'
    - name: job
      value: node-exporter
    - name: fstype
      value: btrfs
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  # this fires all the time, but CPU is fine on the nodes? not sure what it's actually suppose to be monitoring, and the rulebook link 404's
  name: no-node-system-saturaton
spec:
  matchers:
    - name: alertname
      value: NodeSystemSaturation
      matchType: '=~'
    - name: job
      value: node-exporter
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: no-disk-saturation-on-nas
spec:
  matchers:
    - name: alertname
      value: NodeDiskIOSaturation
      matchType: '=~'
    - name: job
      value: node-exporter
    - name: instance
      value: nas.servers.internal:9100
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
    - name: horizontalpodautoscaler
      value: silent-.*
      matchType: '=~'
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: smart-device-high-temperature
spec:
  matchers:
    - name: alertname
      value: SmartDeviceHighTemperature
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: etcd-database-high-fragmentation-ratio
spec:
  matchers:
    - name: alertname
      value: etcdDatabaseHighFragmentationRatio
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: etcd-high-commit-durations
spec:
  matchers:
    - name: alertname
      value: etcdHighCommitDurations
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: etcd-member-communication-slow
spec:
  matchers:
    - name: alertname
      value: etcdMemberCommunicationSlow
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: victoria-metrics-kube-scheduler
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
    - name: recording
      value: cluster_quantile:scheduler_.*
      matchType: '=~'
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: victoria-metrics-authentik
spec:
  matchers:
    - name: alertname
      value: RecordingRulesNoData
    - name: group
      value: authentik .*
      matchType: '=~'
    - name: recording
      value: job:django_.*
      matchType: '=~'
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: renovate-job-failed
spec:
  matchers:
    - name: alertname
      value: KubeJobFailed
    - name: job_name # I don't care that a renovate job failed, because it's probably just ghcr being down again
      value: renovate-.*
      matchType: '=~'
