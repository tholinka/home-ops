---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io
    crds:
      plain: true
    operator:
      enable_converter_ownership: true
    serviceMonitor:
      enabled: true
      vm: false # can't be enabled, because this chart is what installs the CRD for VMServiceScrape
