---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-metrics-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  values:
    fullnameOverride: *app
    alertmanager:
      config:
        route:
          receiver: pushover
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: heartbeat
              matchers:
                - alertname = "Watchdog"
              group_interval: 5m
              group_wait: 0s
              repeat_interval: 5m
          group_by:
            - alertname
            - cluster
            - job
          group_interval: 5m
          group_wait: 1m
        inhibit_rules:
          - equal:
              - alertname
              - namespace
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: heartbeat
            webhook_configs:
              - url_secret:
                  name: &secret vmalertmanager
                  key: HEALTHCHECKS_IO_HEARTBEAT_URL
          - name: pushover
            pushover_configs:
              - html: true
                message: |-
                  {{- range .Alerts }}
                    {{- if ne .Annotations.description "" }}
                      {{ .Annotations.description }}
                    {{- else if ne .Annotations.summary "" }}
                      {{ .Annotations.summary }}
                    {{- else if ne .Annotations.message "" }}
                      {{ .Annotations.message }}
                    {{- else }}
                      Alert description not available
                    {{- end }}
                    {{- if gt (len .Labels.SortedPairs) 0 }}
                      <small>
                        {{- range .Labels.SortedPairs }}
                          <b>{{ .Name }}:</b> {{ .Value }}
                        {{- end }}
                      </small>
                    {{- end }}
                  {{- end }}
                priority: |-
                  {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
                send_resolved: true
                sound: gamelan
                title: >-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                token:
                  name: *secret
                  key: ALERTMANAGER_PUSHOVER_TOKEN
                url_title: View in Alertmanager
                user_key:
                  name: *secret
                  key: PUSHOVER_USER_KEY
      route:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics Alertmanager
          gethomepage.dev/icon: alertmanager.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmalertmanager
        hostnames:
          - alertmanager.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
      spec:
        externalURL: https://vmalertmanager.tholinka.dev
        image:
          repository: quay.io/prometheus/alertmanager
        securityContext:
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 2000
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
      useManagedConfig: true
    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
    grafana:
      enabled: false
      forceDeployDatasource: true
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    prometheus-node-exporter:
      fullnameOverride: node-exporter
    victoria-metrics-operator:
      enabled: false
    vmagent:
      spec:
        extraArgs:
          promscrape.dropOriginalLabels: 'true'
          promscrape.maxScrapeSize: 50MiB
          promscrape.streamParse: 'true'
        resources:
          requests:
            cpu: 200m
          limits:
            cpu: 500m
    vmalert:
      spec:
        extraArgs:
          external.url: https://vmalert.tholinka.dev
        datasource:
          url: http://vmauth-victoria-metrics-cluster.observability.svc.cluster.local:8427
      route:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics Alerts
          gethomepage.dev/icon: victoriametrics.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmalert
        hostnames:
          - alerts.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
    vmauth:
      enabled: true
      spec:
        extraArgs:
          requestBufferSize: '65536'
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/label/.*
              url_prefix: http://vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428
    vmsingle:
      route:
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Metrics
          gethomepage.dev/icon: victoriametrics.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=vmsingle
        enabled: true
        hostnames:
          - metrics.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
      spec:
        retentionPeriod: 90d
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          storageClassName: ceph-block
    additionalVictoriaMetricsMap:
      dockerhub-rules:
        create: true
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        create: true
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
      btrfs-rules:
        groups:
          - name: btrfs
            rules:
              - alert: BtrfsDeviceErrorsDetected
                annotations:
                  sumamry: BTRFS device {{$labels.device}} on {{$labels.kubernetes_node}}@{{$labels.instance}} detected an error of type {{$labels.type}}
                expr: node_btrfs_device_errors_total > 0
                labels:
                  severity: critical
              - alert: BtrfsDeviceAlmostFull
                annotations:
                  summary: BTRFS device {{$labels.device}}@{{$labels.instance}} has less than 1% of free space left
                expr: (node_btrfs_device_unused_bytes{job="node-exporter"} / node_btrfs_device_size_bytes{job="node-exporter"} * 100) < 1
                labels:
                  severity: critical
