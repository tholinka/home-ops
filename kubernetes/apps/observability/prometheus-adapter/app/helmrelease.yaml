---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prometheus-adapter
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    prometheus:
      url: http://vmsingle-victoria-metrics.observability.svc.cluster.local
      port: 8428
    rules:
      default: false
      external:
        - seriesQuery: '{__name__="probe_success"}'
          resources:
            namespaced: false
          name:
            as: probe_success
          metricsQuery: max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])
        - seriesQuery: '{__name__="kube_statefulset_status_replicas_ready"}'
          resources:
            namespaced: false
          name:
            as: kube_statefulset_status_replicas_ready
          metricsQuery: <<.Series>>{<<.LabelMatchers>>}
