---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gatus
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    nameOverride: *app

    deploymentAnnotations:
      reloader.stakater.com/auto: 'true'

    *app :
      delayStartSeconds: '5'
      envFrom:
        - secretRef:
            name: '{{ .Release.Name }}-secret'

    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true

    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: 'false'
        gethomepage.dev/enabled: 'true'
        gethomepage.dev/group: Observability
        gethomepage.dev/name: Gatus
        gethomepage.dev/icon: gatus.svg
        gethomepage.dev/widget.type: *app
        gethomepage.dev/widget.url: 'http://{{ .Release.Name }}.observability.svc.cluster.local.:80'
      hostnames: [status.tholinka.dev]
      parentRefs:
        - name: envoy-external
          namespace: network

    monitoring:
      serviceMonitor:
        enabled: true

    config:
      existingConfigMap: '{{ .Release.Name }}-configmap'
      items:
        - key: config.yaml
          path: config.yaml

    persistence:
      enabled: true
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      size: 5Gi

    resources:
      requests:
        cpu: 100m
      limits:
        memory: 512Mi

    volumes:
      - name: secret
        secret:
          secretName: '{{ .Release.Name }}-secret'

    volumeMounts:
      - name: secret
        mountPath: /config/secret.yaml
        readOnly: true
        subPath: config.yaml
