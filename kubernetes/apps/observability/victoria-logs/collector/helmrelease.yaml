---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    fullnameOverride: *app
    remoteWrite:
      - url: http://victoria-logs-server.{{ .Release.Namespace }}.svc.cluster.local:9428
        maxDiskUsagePerURL: 10GB
    collector:
      streamFields:
        - kubernetes.pod_name
        - kubernetes.pod_namespace
        - kubernetes.container_name
        - kubernetes.pod_labels.app.kubernetes.io/name
    extraArgs:
      'kubernetesCollector.decolorizeFields': _msg
      enableTCP6: true
    global:
      image:
        registry: quay.io
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    podMonitor:
      enabled: true
      vm: true
