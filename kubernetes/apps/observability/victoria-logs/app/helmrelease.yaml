---
# yaml-language-server: $schema=https://schemas.tholinka.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    fullnameOverride: *app
    global:
      image:
        registry: quay.io
    server:
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        annotations:
          gethomepage.dev/enabled: 'true'
          gethomepage.dev/group: Observability
          gethomepage.dev/name: Victoria Logs
          gethomepage.dev/icon: victorialogs.svg
          gethomepage.dev/pod-selector: app.kubernetes.io/name=victoria-logs-single
        hostnames:
          - logs.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /
      serviceMonitor:
        enabled: true
    vector:
      enabled: false
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
