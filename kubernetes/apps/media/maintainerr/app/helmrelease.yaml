---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app maintainerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        containers:
          app:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.15.0@sha256:b510727bec3ab57d59702cd780566227b39c919641818de09c4517a1095f6611
            probes:
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health/live
                    port: &port 6246
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health/ready
                    port: *port
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 6246
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              #readOnlyRootFilesystem: true # causes __PATH_PREFIX___ to be in the url
              capabilities: { drop: ['ALL'] }
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: 'OnRootMismatch'

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - maintainerr.tholinka.dev
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/data
      data-cache:
        existingClaim: maintainerr-cache
        globalMounts:
          - path: /opt/app/ui/.next/cache
