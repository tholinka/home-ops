---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app upload-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    ignore:
      - paths: [/spec/replicas]
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: ghcr.io/audionut/upload-assistant
              tag: 31.0.2@sha256:6ecbdd9287e1cab58bccd1719664382ee7ef7356df4d47429e426b5d365b45f8
            args:
              - --webui
              - 0.0.0.0:80
            env:
              UA_BROWSE_ROOTS: /media/downloads/qbittorrent,/Upload-Assistant/tmp
              SESSION_SECRET_FILE: &session /Upload-Assistant/data/session_secret
              IN_DOCKER: 1
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 80
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ['ALL'] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - '{{ .Release.Name }}.tholinka.dev'
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      media:
        type: nfs
        server: nas.servers.internal
        path: /media
        globalMounts:
          - path: /media/downloads/qbittorrent
            subPath: downloads/qbittorrent

      config:
        enabled: true
        type: secret
        name: *app
        globalMounts:
          - path: /Upload-Assistant/data/config.py
            subPath: config.py
            readOnly: true
          - path: *session
            subPath: session-secret
            readOnly: true

      tmpfs:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /Upload-Assistant/tmp
            subPath: tmp
