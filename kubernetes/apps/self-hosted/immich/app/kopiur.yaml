---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}-photos-s3
spec:
  compression:
    compressor: zstd-best-compression
  copyMethod: Direct
  mover:
    cache:
      capacity: 5Gi
      mode: Persistent
      storageClassName: openebs-hostpath
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
  repository:
    kind: ClusterRepository
    name: s3
  retention:
    keepDaily: 2
    keepWeekly: 1
    keepMonthly: 2
  sources:
    - pvc:
        name: ${APP}-photos
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kopiur.home-operations.com/snapshotschedule_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: &name ${APP}-photos-s3
spec:
  policyRef:
    name: *name
  schedule:
    cron: 'H 3 * * *'
