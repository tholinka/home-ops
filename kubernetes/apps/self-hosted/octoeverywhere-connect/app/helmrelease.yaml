---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app octoeverywhere-connect
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: 'true'
        containers:
          app:
            image:
              repository: mirror.gcr.io/octoeverywhere/octoeverywhere
              tag: 5.0.2@sha256:1a20ff4310eee08d13fffcef30af2fa86a466905f1bcb32410f1a246e201fe82
            env:
              COMPANION_MODE: klipper
              PRINTER_IP: cc.3dprinter.iot.internal
              MOONRAKER_PORT: 80
              WEBSERVER_PORT: 80
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ['ALL'] }
              readOnlyRootFilesystem: true

    defaultPodOptions:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      data:
        existingClaim: *app
