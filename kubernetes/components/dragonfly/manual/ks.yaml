---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${APP}-dragonfly
  namespace: &namespace database
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: &app ${APP}
      dragonflydb.io/acl: 'true' # seems to be dropped when directly on the resourcesetinputprovider? weird
  dependsOn:
    - name: dragonfly-cluster
      namespace: database
  interval: 1h
  path: ./kubernetes/components/dragonfly/manual/database
  postBuild:
    substitute:
      APP: *app
      OWNER: ${DATABASE_OWNER:=${APP}}
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
