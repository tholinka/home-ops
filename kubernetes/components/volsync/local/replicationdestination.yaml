---
# yaml-language-server: $schema=https://schemas.tholinka.dev/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: '${APP}-dst'
  labels:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  trigger:
    manual: restore-once
  kopia:
    accessModes: ['${VOLSYNC_ACCESSMODES:=ReadWriteOnce}']
    cacheAccessModes: ['${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}']
    cacheCapacity: '${VOLSYNC_CACHE_CAPACITY:=5Gi}'
    cacheStorageClassName: '${VOLSYNC_CACHE_STORAGECLASS:=openebs-hostpath}'
    capacity: '${VOLSYNC_CAPACITY:=5Gi}'
    cleanupCachePVC: true
    cleanupTempPVC: true
    copyMethod: Snapshot
    enableFileDeletion: true
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            server: nas.servers.internal
            path: /backups/VolsyncKopia
    repository: ${APP}-volsync-secret
    sourceIdentity:
      sourceName: ${APP}
    storageClassName: '${VOLSYNC_STORAGECLASS:=ceph-block}'
    volumeSnapshotClassName: '${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}'
    policyConfig:
      configMapName: 'volsync-kopia-${APP}-policy'
