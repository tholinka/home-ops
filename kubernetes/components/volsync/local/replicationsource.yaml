---
# yaml-language-server: $schema=https://schemas.tholinka.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: '${APP}'
spec:
  sourcePVC: '${APP}'
  trigger:
    schedule: '0 */2 * * *'
  kopia:
    accessModes: ['${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}']
    cacheAccessModes: ['${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}']
    cacheCapacity: '${VOLSYNC_CACHE_CAPACITY:=5Gi}'
    cacheStorageClassName: '${VOLSYNC_CACHE_STORAGECLASS:=ceph-block}'
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    parallelism: 2
    moverVolumes:
      - mountPath: repository
        volumeSource:
          nfs:
            server: nas.servers.internal
            path: /backups/VolsyncKopia
    repository: '${APP}-volsync-secret'
    compression: zstd-fastest
    retain:
      hourly: 12
      daily: 7
      weekly: 4
      monthly: 12
    storageClassName: '${VOLSYNC_STORAGECLASS:=ceph-block}'
    volumeSnapshotClassName: '${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}'
    policyConfig:
      configMapName: 'volsync-kopia-${APP}-policy'
