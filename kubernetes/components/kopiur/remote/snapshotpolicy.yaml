---
# yaml-language-server: $schema=https://schemas.tholinka.dev/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${APP}-s3
spec:
  compression:
    compressor: zstd-best-compression
  mover:
    cache:
      capacity: ${KOPIUR_CAPACITY:=5Gi}
      mode: Persistent
      storageClassName: ceph-block
    podSecurityContext:
      fsGroupChangePolicy: ${KOPIUR_FS_GROUP_CHANGE_POLICY:=OnRootMismatch}
  repository:
    kind: ClusterRepository
    name: s3
  retention:
    keepLatest: 3
    keepDaily: 7
  sources:
    - pvc:
        name: ${APP}
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-ceph-blockpool}
